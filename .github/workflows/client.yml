name: Build Client Container

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAG="${{ github.head_ref }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
          build-args: |
            TARGET_BIN=client
          tags: |
            ghcr.io/${{ github.repository_owner }}/iroh-vpn-proxy:${{ steps.tag.outputs.tag }}-client
            ${{ github.event_name == 'push' && github.ref_name == 'main' && format('ghcr.io/{0}/iroh-vpn-proxy:latest-client', github.repository_owner) || '' }}
            ghcr.io/${{ github.repository_owner }}/iroh-vpn-proxy:${{ github.sha }}-client
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
